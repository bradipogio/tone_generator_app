<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Generatore audio minimale mobile-first con toni, noise, sweep e routing Left/Right/Stereo."
    />
    <meta name="theme-color" content="#ffd54f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <title>Tone Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-main">
        <fieldset class="field channel-field">
          <legend class="sr-only">Canale</legend>
          <div id="channelGroup" class="channel-group" role="radiogroup" aria-label="Canale di uscita">
            <label class="channel-option">
              <input type="radio" name="channel" value="left" />
              <span>L</span>
            </label>
            <label class="channel-option channel-stereo">
              <input type="radio" name="channel" value="stereo" checked />
              <span>&infin;</span>
            </label>
            <label class="channel-option channel-right">
              <input type="radio" name="channel" value="right" />
              <span>R</span>
            </label>
          </div>
        </fieldset>

        <div id="frequencyPanel" class="frequency-grid frequency-grid-main">
          <div class="stepper-row stepper-row-main">
            <button id="decreaseButton" class="btn btn-step" type="button" aria-label="Diminuisci frequenza">
              -
            </button>
            <label class="field field-grow">
              <span class="sr-only">Frequenza</span>
              <div class="frequency-input-shell">
                <input
                  id="frequencyInput"
                  class="frequency-input"
                  type="number"
                  min="20"
                  max="22000"
                  step="1"
                  inputmode="numeric"
                  value="440"
                />
                <span class="frequency-edit-unit">Hz</span>
              </div>
            </label>
            <button id="increaseButton" class="btn btn-step" type="button" aria-label="Aumenta frequenza">
              +
            </button>
          </div>
        </div>

        <label class="field frequency-slider-field">
          <span class="sr-only">Slider frequenza</span>
          <input
            id="frequencySlider"
            type="range"
            min="0"
            max="1000"
            step="1"
            value="662"
          />
        </label>

        <fieldset class="field">
          <legend class="sr-only">Sorgente</legend>
          <div id="wavePicker" class="wave-picker">
            <div class="wave-group wave-group-main" role="group" aria-label="Sorgente audio">
              <button
                id="toneFamilyButton"
                class="wave-button"
                type="button"
                aria-label="Sinusoide. Tieni premuto per le altre onde"
                aria-haspopup="true"
                aria-expanded="false"
              >
                <span class="wave-button-face">
                  <svg id="toneFamilyIcon" class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 17 C8 17 8 5 16 5 S24 29 32 29 S40 5 48 5 S56 17 62 17" />
                  </svg>
                  <span id="toneFamilyLabel" class="sr-only">Sinusoide</span>
                </span>
              </button>
              <button
                class="wave-button"
                type="button"
                data-waveform-button
                data-waveform="white-noise"
                aria-label="Rumore bianco"
              >
                <span class="wave-button-face">
                  <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 17 L8 10 L14 21 L20 8 L26 24 L32 9 L38 22 L44 6 L50 19 L56 11 L62 17" />
                  </svg>
                  <span class="sr-only">Rumore bianco</span>
                </span>
              </button>
              <button
                class="wave-button"
                type="button"
                data-waveform-button
                data-waveform="pink-noise"
                aria-label="Rumore rosa"
              >
                <span class="wave-button-face">
                  <svg class="wave-icon wave-icon-pink" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 17 L8 10 L14 21 L20 8 L26 24 L32 9 L38 22 L44 6 L50 19 L56 11 L62 17" />
                  </svg>
                  <span class="sr-only">Rumore rosa</span>
                </span>
              </button>
            </div>

            <div id="toneWaveMenu" class="tone-wave-menu" role="menu" aria-label="Altre onde" hidden>
              <button type="button" class="tone-wave-menu-button" data-wave-menu-item data-waveform="sine" aria-label="Sinusoide">
                <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                  <path d="M2 17 C8 17 8 5 16 5 S24 29 32 29 S40 5 48 5 S56 17 62 17" />
                </svg>
              </button>
              <button type="button" class="tone-wave-menu-button" data-wave-menu-item data-waveform="square" aria-label="Quadra">
                <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                  <path d="M2 17 H14 V7 H30 V25 H46 V7 H62 V17" />
                </svg>
              </button>
              <button type="button" class="tone-wave-menu-button" data-wave-menu-item data-waveform="triangle" aria-label="Triangolo">
                <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                  <path d="M2 17 L14 7 L30 29 L46 5 L58 17 L62 17" />
                </svg>
              </button>
              <button type="button" class="tone-wave-menu-button" data-wave-menu-item data-waveform="sawtooth" aria-label="Dente di sega">
                <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                  <path d="M2 12 L14 24 V4 L34 24 V4 L54 24 V12 H62" />
                </svg>
              </button>
            </div>
          </div>
        </fieldset>

        <label class="field volume-field">
          <span class="sr-only">Volume</span>
          <div class="range-row volume-row">
            <div class="volume-slider-shell">
              <div id="volumeFill" class="volume-slider-fill" aria-hidden="true"></div>
              <span class="volume-icon volume-icon-overlay" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M4 14h3.4L12 18V6L7.4 10H4z" />
                  <path d="M15 9.2a4.8 4.8 0 0 1 0 5.6" />
                  <path d="M17.8 6.8a8.2 8.2 0 0 1 0 10.4" />
                </svg>
              </span>
              <input
                id="volumeInput"
                class="volume-slider"
                type="range"
                min="0"
                max="100"
                step="1"
                value="10"
              />
            </div>
          </div>
        </label>

        <button id="powerButton" class="btn btn-primary btn-power btn-power-large" type="button" aria-label="Avvia o ferma audio">
          <span id="powerIcon" class="power-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" focusable="false" aria-hidden="true">
              <path d="M11 8.5L23 16L11 23.5Z" />
            </svg>
          </span>
        </button>
      </section>

      <section id="sweepPanel" class="panel panel-sweep">
        <div class="sweep-visual-grid">
          <div class="field sweep-range-field">
            <div id="sweepRange" class="dual-range">
              <div id="sweepStartBadge" class="range-badge range-badge-start">20</div>
              <div id="sweepEndBadge" class="range-badge range-badge-end">1000</div>
              <div id="sweepRangeFill" class="dual-range-fill"></div>
              <input
                id="sweepStartSlider"
                class="range-start"
                type="range"
                min="0"
                max="1000"
                step="1"
                value="300"
              />
              <input
                id="sweepEndSlider"
                class="range-end"
                type="range"
                min="0"
                max="1000"
                step="1"
                value="638"
              />
            </div>
          </div>

        </div>

        <div class="sweep-action-row">
          <fieldset class="field sweep-duration-field">
            <legend class="sr-only">Durata sweep</legend>
            <div class="sweep-duration-group" role="radiogroup" aria-label="Durata sweep in secondi">
              <label class="sweep-duration-option">
                <input type="radio" name="sweepDuration" value="5" />
                <span>5</span>
              </label>
              <label class="sweep-duration-option">
                <input type="radio" name="sweepDuration" value="15" checked />
                <span>15</span>
              </label>
              <label class="sweep-duration-option">
                <input type="radio" name="sweepDuration" value="30" />
                <span>30</span>
              </label>
            </div>
          </fieldset>

          <button id="toggleSweepButton" class="btn btn-primary btn-sweep-toggle" type="button">Sweep</button>
        </div>
      </section>

      <section class="scope-panel" aria-hidden="true">
        <canvas id="waveformScope" class="waveform-scope"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
