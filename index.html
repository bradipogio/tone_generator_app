<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Generatore audio minimale mobile-first con toni, noise, sweep e routing Left/Right/Stereo."
    />
    <title>Tone Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-main">
        <div class="panel-head">
          <h1>Tone Generator</h1>
          <p id="statusText" class="status">Pronto</p>
        </div>

        <div class="display display-compact" aria-live="polite">
          <span id="frequencyValue">440</span>
          <span id="frequencyUnit" class="display-unit">Hz</span>
        </div>

        <div class="button-row">
          <button id="startButton" class="btn btn-primary" type="button">Start</button>
          <button id="stopButton" class="btn btn-secondary" type="button">Stop</button>
        </div>

        <div class="control-grid">
          <fieldset class="field">
            <legend>Sorgente</legend>
            <div class="wave-group" role="radiogroup" aria-label="Sorgente audio">
              <label class="wave-option" title="Sine">
                <input type="radio" name="waveform" value="sine" checked />
                <span>∿</span>
              </label>
              <label class="wave-option" title="Square">
                <input type="radio" name="waveform" value="square" />
                <span>⊓</span>
              </label>
              <label class="wave-option" title="Triangle">
                <input type="radio" name="waveform" value="triangle" />
                <span>△</span>
              </label>
              <label class="wave-option" title="Sawtooth">
                <input type="radio" name="waveform" value="sawtooth" />
                <span>⟋</span>
              </label>
              <label class="wave-option" title="Noise">
                <input type="radio" name="waveform" value="noise" />
                <span>≈</span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span>Volume</span>
            <div class="range-row">
              <input
                id="volumeInput"
                type="range"
                min="0"
                max="100"
                step="1"
                value="10"
              />
              <output id="volumeValue" for="volumeInput">10%</output>
            </div>
          </label>
        </div>

        <fieldset class="field channel-field">
          <legend>Canale</legend>
          <div id="channelGroup" class="channel-group" role="radiogroup" aria-label="Canale di uscita">
            <label class="channel-option">
              <input type="radio" name="channel" value="left" />
              <span>◀</span>
            </label>
            <label class="channel-option">
              <input type="radio" name="channel" value="stereo" checked />
              <span>●</span>
            </label>
            <label class="channel-option">
              <input type="radio" name="channel" value="right" />
              <span>▶</span>
            </label>
          </div>
        </fieldset>
      </section>

      <section id="frequencyPanel" class="panel">
        <div class="panel-head">
          <h2>Frequency</h2>
          <span class="panel-note">1-22000 Hz</span>
        </div>

        <div class="frequency-grid">
          <div class="stepper-row stepper-row-compact">
            <button id="decreaseButton" class="btn btn-step" type="button" aria-label="Diminuisci frequenza">
              -
            </button>
            <label class="field field-grow">
              <span>Hz</span>
              <input
                id="frequencyInput"
                type="number"
                min="1"
                max="22000"
                step="1"
                inputmode="decimal"
                value="440"
              />
            </label>
            <button id="increaseButton" class="btn btn-step" type="button" aria-label="Aumenta frequenza">
              +
            </button>
          </div>

          <label class="field field-step">
            <span>Step</span>
            <select id="stepSelect">
              <option value="1">1 Hz</option>
              <option value="5">5 Hz</option>
              <option value="10" selected>10 Hz</option>
              <option value="50">50 Hz</option>
              <option value="100">100 Hz</option>
              <option value="1000">1000 Hz</option>
            </select>
          </label>
        </div>
      </section>

      <section id="sweepPanel" class="panel">
        <div class="panel-head">
          <h2>Sweep</h2>
          <span class="panel-note">Hz/s</span>
        </div>

        <div class="control-grid compact-grid sweep-grid">
          <label class="field">
            <span>Start</span>
            <input
              id="sweepStartInput"
              type="number"
              min="1"
              max="22000"
              step="1"
              inputmode="decimal"
              value="20"
            />
          </label>

          <label class="field">
            <span>End</span>
            <input
              id="sweepEndInput"
              type="number"
              min="1"
              max="22000"
              step="1"
              inputmode="decimal"
              value="1000"
            />
          </label>

          <label class="field">
            <span>Speed</span>
            <input
              id="sweepSpeedInput"
              type="number"
              min="0.1"
              max="50000"
              step="0.1"
              inputmode="decimal"
              value="100"
            />
          </label>

          <label class="field">
            <span>Mode</span>
            <select id="sweepDirectionSelect">
              <option value="up">up</option>
              <option value="down">down</option>
              <option value="ping-pong">ping-pong</option>
            </select>
          </label>
        </div>

        <div class="button-row button-row-triple">
          <button id="startSweepButton" class="btn btn-primary" type="button">Sweep</button>
          <button id="stopSweepButton" class="btn btn-secondary" type="button">Stop</button>
          <button id="holdButton" class="btn btn-muted" type="button">Hold</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
