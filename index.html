<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Generatore audio minimale mobile-first con toni, noise, sweep e routing Left/Right/Stereo."
    />
    <title>Tone Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-main">
        <div class="hero-row">
          <div class="display display-compact" aria-live="polite">
            <span id="frequencyValue">440</span>
            <span id="frequencyUnit" class="display-unit">Hz</span>
          </div>
          <button id="powerButton" class="btn btn-primary btn-power" type="button">Start</button>
        </div>

        <div class="control-grid">
          <fieldset class="field">
            <legend>Sorgente</legend>
            <div class="wave-group" role="radiogroup" aria-label="Sorgente audio">
              <label class="wave-option" title="Sine">
                <input type="radio" name="waveform" value="sine" checked />
                <span>
                  <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 17 C8 17 8 5 16 5 S24 29 32 29 S40 5 48 5 S56 17 62 17" />
                  </svg>
                </span>
              </label>
              <label class="wave-option" title="Square">
                <input type="radio" name="waveform" value="square" />
                <span>
                  <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 17 H14 V7 H30 V25 H46 V7 H62 V17" />
                  </svg>
                </span>
              </label>
              <label class="wave-option" title="Triangle">
                <input type="radio" name="waveform" value="triangle" />
                <span>
                  <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 17 L14 7 L30 29 L46 5 L58 17 L62 17" />
                  </svg>
                </span>
              </label>
              <label class="wave-option" title="Sawtooth">
                <input type="radio" name="waveform" value="sawtooth" />
                <span>
                  <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 12 L14 24 V4 L34 24 V4 L54 24 V12 H62" />
                  </svg>
                </span>
              </label>
              <label class="wave-option" title="Noise">
                <input type="radio" name="waveform" value="noise" />
                <span>
                  <svg class="wave-icon" viewBox="0 0 64 32" aria-hidden="true">
                    <path d="M2 17 L8 10 L14 21 L20 8 L26 24 L32 9 L38 22 L44 6 L50 19 L56 11 L62 17" />
                  </svg>
                </span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span>Volume</span>
            <div class="range-row">
              <input
                id="volumeInput"
                type="range"
                min="0"
                max="100"
                step="1"
                value="10"
              />
              <output id="volumeValue" for="volumeInput">10%</output>
            </div>
          </label>
        </div>

        <fieldset class="field channel-field">
          <legend>Canale</legend>
          <div id="channelGroup" class="channel-group" role="radiogroup" aria-label="Canale di uscita">
            <label class="channel-option">
              <input type="radio" name="channel" value="left" />
              <span>L</span>
            </label>
            <label class="channel-option channel-stereo">
              <input type="radio" name="channel" value="stereo" checked />
              <span>&infin;</span>
            </label>
            <label class="channel-option channel-right">
              <input type="radio" name="channel" value="right" />
              <span>R</span>
            </label>
          </div>
        </fieldset>
      </section>

      <section id="frequencyPanel" class="panel">
        <div class="panel-head">
          <h2>Frequency</h2>
          <span class="panel-note">1-22000 Hz</span>
        </div>

        <div class="frequency-grid">
          <div class="stepper-row stepper-row-compact">
            <button id="decreaseButton" class="btn btn-step" type="button" aria-label="Diminuisci frequenza">
              -
            </button>
            <label class="field field-grow">
              <span>Hz</span>
              <input
                id="frequencyInput"
                type="number"
                min="1"
                max="22000"
                step="1"
                inputmode="decimal"
                value="440"
              />
            </label>
            <button id="increaseButton" class="btn btn-step" type="button" aria-label="Aumenta frequenza">
              +
            </button>
          </div>

          <label class="field field-step">
            <span>Step</span>
            <select id="stepSelect">
              <option value="1">1 Hz</option>
              <option value="5">5 Hz</option>
              <option value="10" selected>10 Hz</option>
              <option value="50">50 Hz</option>
              <option value="100">100 Hz</option>
              <option value="1000">1000 Hz</option>
            </select>
          </label>
        </div>

        <label class="field frequency-slider-field">
          <span>Slider</span>
          <input
            id="frequencySlider"
            type="range"
            min="0"
            max="1000"
            step="1"
            value="662"
          />
        </label>
      </section>

      <section id="sweepPanel" class="panel">
        <div class="panel-head">
          <h2>Sweep</h2>
          <span class="panel-note">log</span>
        </div>

        <div class="control-grid compact-grid sweep-grid">
          <label class="field">
            <span>Start</span>
            <input
              id="sweepStartInput"
              type="number"
              min="1"
              max="22000"
              step="1"
              inputmode="decimal"
              value="20"
            />
          </label>

          <label class="field">
            <span>End</span>
            <input
              id="sweepEndInput"
              type="number"
              min="1"
              max="22000"
              step="1"
              inputmode="decimal"
              value="1000"
            />
          </label>

          <label class="field">
            <span>Speed</span>
            <input
              id="sweepSpeedInput"
              type="number"
              min="0.1"
              max="50000"
              step="0.1"
              inputmode="decimal"
              value="100"
            />
          </label>

          <label class="field">
            <span>Mode</span>
            <select id="sweepDirectionSelect">
              <option value="up">up</option>
              <option value="down">down</option>
              <option value="ping-pong">ping-pong</option>
            </select>
          </label>
        </div>

        <div class="sweep-visual-grid">
          <label class="field">
            <div class="field-inline">
              <span>Speed Curve</span>
              <output id="sweepSpeedValue" for="sweepSpeedSlider">100</output>
            </div>
            <input
              id="sweepSpeedSlider"
              type="range"
              min="0"
              max="1000"
              step="1"
              value="638"
            />
          </label>

          <div class="field sweep-range-field">
            <div class="field-inline">
              <span>Range</span>
              <output id="sweepRangeValue" for="sweepStartSlider sweepEndSlider">20 → 1000 Hz</output>
            </div>

            <div class="dual-range">
              <div id="sweepRangeFill" class="dual-range-fill"></div>
              <input
                id="sweepStartSlider"
                class="range-start"
                type="range"
                min="0"
                max="1000"
                step="1"
                value="300"
              />
              <input
                id="sweepEndSlider"
                class="range-end"
                type="range"
                min="0"
                max="1000"
                step="1"
                value="638"
              />
            </div>
          </div>
        </div>

        <div class="button-row button-row-triple">
          <button id="startSweepButton" class="btn btn-primary" type="button">Sweep</button>
          <button id="stopSweepButton" class="btn btn-secondary" type="button">Stop</button>
          <button id="holdButton" class="btn btn-muted" type="button">Hold</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
